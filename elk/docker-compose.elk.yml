# ELK Stack (Elasticsearch + Logstash + Kibana) for NetRestore Monitoring
#
# This is a SEPARATE Docker Compose stack from the main application.
# Run with: docker compose -f docker-compose.elk.yml up -d
#
# Access points:
#   Elasticsearch:  http://localhost:9200
#   Kibana:         http://localhost:5601
#   Logstash:       tcp://localhost:5044 (Beats input for Filebeat)
#
# Kibana Dashboard panels to create:
#   1. Query Volume: Line chart of query count over time (index: netrestore-logs-*)
#   2. Average Latency: Gauge showing mean latency_seconds
#   3. Vendor Distribution: Pie chart of vendor_filter values
#   4. Failure Rate: Percentage of status=error events

version: "3.9"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: telecom-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: telecom-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "5044:5044"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: telecom-kibana
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  es_data:
    driver: local
