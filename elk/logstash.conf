# Logstash Pipeline Configuration for Telecom RAG
#
# Receives logs from Filebeat on port 5044, parses the JSON-structured
# application logs, and ships them to Elasticsearch with date-based indexing.

input {
  # Receives log events from Filebeat agents on K8s nodes / Docker hosts
  beats {
    port => 5044
  }
}

filter {
  # Parse the JSON message field emitted by our structured Python logger
  json {
    source => "message"
    skip_on_invalid_json => true
  }

  # Type conversions for numeric fields (ensures proper aggregation in Kibana)
  if [event] == "query_executed" or [event] == "query_failed" {
    mutate {
      convert => { "latency_seconds" => "float" }
      convert => { "num_sources" => "integer" }
    }
    # Add a human-readable tag for dashboard filtering
    mutate {
      add_tag => ["telecom_rag_query"]
    }
  }

  if [event] == "chat_cleared" {
    mutate {
      add_tag => ["telecom_rag_session"]
    }
  }

  # Drop internal Filebeat heartbeat/monitoring events to reduce noise
  if [agent][type] == "filebeat" and ![event] {
    drop { }
  }
}

output {
  # Ship to Elasticsearch with daily index rotation
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "telecom-rag-logs-%{+YYYY.MM.dd}"
  }

  # Optional: stdout for debugging (remove in production)
  # stdout { codec => rubydebug }
}
