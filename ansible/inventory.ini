# Ansible Inventory for Telecom RAG Infrastructure
# Update the IP addresses and usernames to match your actual VMs.

[k8s_nodes]
node1 ansible_host=192.168.56.101 ansible_user=ubuntu
node2 ansible_host=192.168.56.102 ansible_user=ubuntu

[jenkins]
jenkins1 ansible_host=192.168.56.100 ansible_user=ubuntu

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
